# Render blueprint — nasazení celé aplikace (Django + React + Postgres).
# Render při propojení repa tento soubor načte a vytvoří služby automaticky.
databases:
  - name: space-aces-db
    plan: free

services:
  - type: web
    name: space-aces
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: space-aces-db
          property: connectionString
